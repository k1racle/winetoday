name: winemakingtodayyy

services:

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    container_name: vino_web
    environment:
      NODE_ENV: production
      NUXT_PUBLIC_SITE_URL: ${SITE_URL:-http://localhost}
      NUXT_PUBLIC_API_URL: ${NUXT_PUBLIC_API_URL:-http://localhost:4000/api}
      NUXT_PUBLIC_MEDIA_BASE_URL: ${NUXT_PUBLIC_MEDIA_BASE_URL:-http://localhost:4000}
      NUXT_PUBLIC_MEILISEARCH_URL: ${NUXT_PUBLIC_MEILISEARCH_URL:-http://localhost/search}
      NUXT_PUBLIC_EDITOR_URL: ${NUXT_PUBLIC_EDITOR_URL:-http://localhost:3000/account}
      NUXT_PUBLIC_UPLOADS_URL: ${NUXT_PUBLIC_UPLOADS_URL:-http://localhost:4000/uploads}
      API_URL: http://api:4000/api
      REVALIDATE_SECRET: ${REVALIDATE_SECRET}
    ports:
      - "3001:3000"
    networks:
      default:
      winemakingtoday_static:
        ipv4_address: 192.168.240.13
    depends_on:
      api:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    restart: unless-stopped

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: vino_api
    working_dir: /app
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${API_POSTGRES_DB:-winetoday_api}
      SITE_URL: ${SITE_URL:-http://localhost}
      MEDIA_URL: ${MEDIA_URL:-http://localhost/uploads}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      MEILISEARCH_URL: http://meilisearch:7700
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      REVALIDATE_SECRET: ${REVALIDATE_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000,http://localhost:3001}

    ports:
      - "4000:4000"
    volumes:
      - backend_uploads:/app/public/uploads
      - media_uploads:/app/uploads
    networks:
      default:
      winemakingtoday_static:
        ipv4_address: 192.168.240.12
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4000/health').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    restart: unless-stopped

  watermark:
    build:
      context: ./watermark
      dockerfile: Dockerfile
    container_name: vino_watermark
    environment:
      NODE_ENV: production
      PORT: 4001
      UPLOADS_DIR: /app/uploads
      CONCURRENCY: 1
      MAX_QUEUE_SIZE: 10
    volumes:
      - media_uploads:/app/uploads
    networks:
      default:
      winemakingtoday_static:
        ipv4_address: 192.168.240.14
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4001/health').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    container_name: vino_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      API_POSTGRES_DB: ${API_POSTGRES_DB:-winetoday_api}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./api/prisma/init-db.sh:/docker-entrypoint-initdb.d/10-init-api-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: vino_redis
    command: sh -c "redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD} ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  meilisearch:
    image: getmeili/meilisearch:v1.16
    container_name: vino_meilisearch
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      MEILI_ENV: development
    volumes:
      - meili_data:/meili_data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

networks:
  winemakingtoday_static:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.240.0/24

volumes:
  backend_uploads:
    external: true
    name: winemakingtoday_backend_uploads
  media_uploads:
    external: true
    name: winemakingtoday_media_uploads
  postgres_data:
    external: true
    name: winemakingtoday_postgres_data
  redis_data:
    external: true
    name: winemakingtoday_redis_data
  meili_data:
    external: true
    name: winemakingtoday_meili_data
