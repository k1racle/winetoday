services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vino_frontend
    working_dir: /app
    command: sh -c "npm run build && npm run start -- --hostname 0.0.0.0 --port 3000"
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      SITE_URL: ${SITE_URL:-http://localhost}
      CMS_URL: http://backend:1337
      MEDIA_URL: ${MEDIA_URL:-http://localhost/uploads}
      REVALIDATE_SECRET: ${REVALIDATE_SECRET}
      NEXT_PUBLIC_SITE_URL: ${SITE_URL:-http://localhost}
      NEXT_PUBLIC_MEILISEARCH_URL: http://localhost/search
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 120s
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vino_backend
    working_dir: /app
    command: sh -c "node ./scripts/prepare-rich-text-blocks.js && npm run start:strapi"
    environment:
      NODE_ENV: production
      STRAPI_TELEMETRY_DISABLED: "true"
      HOST: 0.0.0.0
      PORT: 1337
      APP_KEYS: ${STRAPI_APP_KEYS}
      API_TOKEN_SALT: ${STRAPI_API_TOKEN_SALT}
      ADMIN_JWT_SECRET: ${STRAPI_ADMIN_JWT_SECRET}
      TRANSFER_TOKEN_SALT: ${STRAPI_TRANSFER_TOKEN_SALT}
      JWT_SECRET: ${STRAPI_JWT_SECRET}
      ENCRYPTION_KEY: ${STRAPI_ENCRYPTION_KEY}
      STRAPI_ADMIN_FIRSTNAME: ${STRAPI_ADMIN_FIRSTNAME}
      STRAPI_ADMIN_LASTNAME: ${STRAPI_ADMIN_LASTNAME}
      STRAPI_ADMIN_EMAIL: ${STRAPI_ADMIN_EMAIL}
      STRAPI_ADMIN_PASSWORD: ${STRAPI_ADMIN_PASSWORD}
      FRONTEND_REVALIDATE_URL: http://frontend:3000/api/revalidate
      REVALIDATE_SECRET: ${REVALIDATE_SECRET}
      SITE_URL: ${SITE_URL:-http://localhost}
      PUBLIC_SERVER_URL: ${PUBLIC_SERVER_URL:-${SITE_URL:-http://localhost}}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      VK_CLIENT_ID: ${VK_CLIENT_ID:-}
      VK_CLIENT_SECRET: ${VK_CLIENT_SECRET:-}
      YANDEX_CLIENT_ID: ${YANDEX_CLIENT_ID:-}
      YANDEX_CLIENT_SECRET: ${YANDEX_CLIENT_SECRET:-}
      DATABASE_CLIENT: postgres
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: ${POSTGRES_DB}
      DATABASE_USERNAME: ${POSTGRES_USER}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      DATABASE_SSL: "false"
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      MEILISEARCH_URL: http://meilisearch:7700
      MEILISEARCH_API_KEY: ${MEILI_MASTER_KEY}
    ports:
      - "1337:1337"
    volumes:
      - backend_uploads:/app/public/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:1337/admin').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 120s
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    container_name: vino_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: vino_redis
    command: sh -c "redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD} ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  meilisearch:
    image: getmeili/meilisearch:v1.16
    container_name: vino_meilisearch
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      MEILI_ENV: development
    volumes:
      - meili_data:/meili_data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  backend_uploads:
  postgres_data:
  redis_data:
  meili_data:
