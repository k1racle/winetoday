# Новый стек: только Nuxt + NestJS API.
# Подключается к уже работающим postgres/redis/meilisearch из стека winemakingtoday.
#
# Portainer: Stacks → Add stack → Git repository
#   Repository: https://github.com/k1racle/winetoday.git
#   Compose path: docker-compose.new.yml

services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: vino_api
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${API_POSTGRES_DB:-winetoday_api}
      SITE_URL: ${SITE_URL:-http://localhost:3001}
      MEDIA_URL: ${MEDIA_URL:-http://localhost:4000/uploads}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      MEILISEARCH_URL: http://meilisearch:7700
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      REVALIDATE_SECRET: ${REVALIDATE_SECRET}
      FRONTEND_REVALIDATE_URL: http://frontend:3000/api/revalidate
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000,http://localhost:3001}
    ports:
      - "4000:4000"
    volumes:
      - backend_uploads:/app/public/uploads
      - media_uploads:/app/uploads
    networks:
      - winemakingtoday_default
      - winemakingtoday_winemakingtoday_static
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    container_name: vino_web
    environment:
      NODE_ENV: production
      NUXT_PUBLIC_SITE_URL: ${SITE_URL:-http://localhost:3001}
      NUXT_PUBLIC_API_URL: ${NUXT_PUBLIC_API_URL:-http://localhost:4000/api}
      NUXT_PUBLIC_MEDIA_BASE_URL: ${NUXT_PUBLIC_MEDIA_BASE_URL:-http://localhost:4000}
      NUXT_PUBLIC_MEILISEARCH_URL: ${NUXT_PUBLIC_MEILISEARCH_URL:-http://localhost/search}
      NUXT_PUBLIC_EDITOR_URL: ${NUXT_PUBLIC_EDITOR_URL:-http://localhost:3000/account}
      NUXT_PUBLIC_UPLOADS_URL: ${NUXT_PUBLIC_UPLOADS_URL:-http://localhost:4000/uploads}
      API_URL: ${API_URL:-http://api:4000/api}
      REVALIDATE_SECRET: ${REVALIDATE_SECRET}
    ports:
      - "3001:3000"
    networks:
      - winemakingtoday_default
      - winemakingtoday_winemakingtoday_static
    depends_on:
      - api
    restart: unless-stopped

networks:
  winemakingtoday_default:
    external: true
  winemakingtoday_winemakingtoday_static:
    external: true

volumes:
  backend_uploads:
    external: true
    name: winemakingtoday_backend_uploads
  media_uploads:
