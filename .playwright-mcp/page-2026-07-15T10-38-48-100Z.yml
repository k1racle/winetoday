        - 'heading "Алексей Синельников: «Есть вина сакральные, а есть — „под котлету“»" [level=1] [ref=f2e45]'
        - figure [ref=f2e46]:
          - 'img "Алексей Синельников: «Есть вина сакральные, а есть — „под котлету“»" [ref=f2e47]'
        - generic [ref=f2e50]:
          - paragraph [ref=f2e51]: Журналист, издатель и основатель самого крупного в России винного комьюнити для любителей «Вино и люди» в разговоре с «ВИНОДЕЛИЕ СЕГОДНЯ» — о демократизации вина, мифах и деньгах, сакральных Бордо и подмосковных виноградниках.
          - paragraph [ref=f2e52]:
            - emphasis [ref=f2e53]: «Мы не заумные»
          - paragraph [ref=f2e54]:
            - strong [ref=f2e55]: — Алексей, в чём ваш секрет? Почему люди, попробовав раз, возвращаются к вам в клуб снова и снова?
          - paragraph [ref=f2e56]: — Мы не заумные. Сейчас виноделие стало гораздо доступнее и понятнее. Круг людей, которые пьют вино, резко расширился. Раньше это были единицы — очень богатые люди. И вокруг них — журналисты, сомелье, дегустаторы, которые по сути обслуживали интересы этой узкой аудитории. Каждый из них стремился быть жрецом и даже больше. Вокруг вина выстроили излишне сакральную историю. Но лет 15–20 назад потребление вина стало расти — и все изменилось. В том числе язык. А я как раз пришёл из «Комсомольской правды» и «Аргументов и фактов» — газет, которые работают с массовым сознанием. Я всю жизнь этим занимался. И те же приёмы работают здесь. Мой канал, моё комьюнити — это отношения с живыми людьми.
          - paragraph [ref=f2e57]:
            - strong [ref=f2e58]: — Говорят, среди ваших читателей много айтишников и финансистов. Это правда? Почему?
          - paragraph [ref=f2e59]: — Мне кажется, это довольно простая история. Они ведь аналитики. А вино — это аналитический продукт. Запахи, ароматы, вкус, история, сорт винограда, терруар, руки винодела. Возможно, на работе у них скучные материи, а на вине они отрываются.
          - paragraph [ref=f2e60]:
            - emphasis [ref=f2e61]: "«Переводчик с винного на русский»: главные мифы"
          - paragraph [ref=f2e62]:
            - strong [ref=f2e63]: — Артур Саркисян назвал вас переводчиком с винного на русский. Какие самые распространённые мифы о вине вы развенчиваете?
          - paragraph [ref=f2e64]: "— Раньше всех волновал вопрос: «Бывает ли вино из порошка?» Сейчас с таким уже почти не сталкиваешься. Мифы, конечно, остались: что домашнее вино лучше, что настоящее надо брать только с завода. Мы с этим тоже боремся. Но вообще ситуация сейчас уникальная. В любом сетевом магазине вы не найдёте поддельного вина. Его просто нет. Так что особо бороться не с чем."
          - paragraph [ref=f2e65]:
            - strong [ref=f2e66]: — А что самое смешное или нелепое вы слышали от новичков на дегустациях?
          - paragraph [ref=f2e67]: "— Знаете, люди на дегустациях обычно не задают глупых вопросов. Они молчат. Потому что вино их пугает. И это большая проблема. Я как раз стараюсь этого не допустить — не напугать человека. Он смотрит на экспертов: они там вращают бокалы, нюхают. Если вот так сразу на него обрушиться, он подумает: «Ребята, да ну, пойду лучше пиво попью — там всё проще и понятнее». Мне нравится втягивать новичков в разговор, не отталкивать их. Говорить: «Приходите, ничего страшного нет, это очень интересно»."
          - paragraph [ref=f2e68]:
            - emphasis [ref=f2e69]: «Дорогие сложные вина новичку покажутся гадостью»
          - paragraph [ref=f2e70]:
            - strong [ref=f2e71]: — Но сегодня винная элитарность всё-таки существует?
          - paragraph [ref=f2e72]: "— Существует, вы правы. Вина, которые действительно стоит сакрализовать, безусловно, есть. Но их крошечный процент. Вот возьмём Бордо: процентов 80 этих вин — просто ни о чём. А остальные 20 — это те, что приносят славу. И лишь несколько процентов из них действительно заслуживают особого отношения. Но проблема в том, что именно на них переносится всё отношение к вину в целом. А большинство вин, есть такое выражение, надо пить «под котлету». То есть очень просто. Чтобы помогало пищеварению."
          - paragraph [ref=f2e73]:
            - strong [ref=f2e74]: — Какие вина на специализированных выставках вы бы посоветовали попробовать обычному посетителю, не эксперту?
          - paragraph [ref=f2e75]: "— Если человек совсем не эксперт, лучше подходить к крупным стендам крупных производителей. У них, как правило, более предсказуемая история. С мелкими винодельнями можно нарваться на такую куртуазность, которую можно не понять. Вообще есть проблема: дорогие сложные вина человеку-новичку покажутся какой-то гадостью. Это и с вином так, и с кофе. Я, например, люблю кофе. Когда впервые попробовал кислый вариант, я огорчился. А потом постепенно вкус развивается. Сначала пьёшь сладкое — как молоко матери. Потом полусладкое. Если есть интерес к развитию — переходишь на полусухое, сухое. А когда уже хорошо погрузился, возвращаешься к сладкому, но более такому — рафинированному, дорогому, с которым интересно поразбираться."
          - paragraph [ref=f2e76]:
            - emphasis [ref=f2e77]: «Тем, кто привык к дорогим импортным винам, перестроиться непросто»
          - paragraph [ref=f2e78]:
            - strong [ref=f2e79]: — Вы много пишете о северном виноделии — Подмосковье, Поволжье, Алтай. Какие регионы за пределами Кубани сегодня самые перспективные?
          - paragraph [ref=f2e80]: "— Есть Ростов, но он как будто заболотился, застрял в каком-то странном состоянии неразвития. Я слежу за этой историей уже 10 лет — и, за редчайшими исключениями, там практически ничего не произошло. Хотя регион интересный, исторический. Что касается Самары, Саратова… взрывного роста там не будет. Возникнут небольшие хозяйства — скорее, на уровне местного интереса. Приехали, захотелось попробовать что-то необычное — а вот вам и местное вино. Но индустриально это очень сложное виноделие: укрывное. Каждый год виноградники нужно закапывать землёй, а весной откапывать. Как и в Ростове."
          - paragraph [ref=f2e81]:
            - strong [ref=f2e82]: — За время, что вы занимаетесь этой темой, изменилось ли отношение к российскому виноделию — у ритейла, закупщиков, потребителей?
          - paragraph [ref=f2e83]: "— Конечно, изменилось. Но тем, кто привык к дорогим импортным винам, перестроиться непросто. Вокруг них годами выстраивали целую систему. Сомелье в ресторанах учились на французских, итальянских образцах, на винах Нового Света. Они тоже не хотят выглядеть глупо. А в вине это очень тонкий момент. Представьте: вы отлично разбираетесь, скажем, в Каберне Фран и Каберне Совиньон. И вдруг вам говорят: «Стоп». Вы пробуете новые вина, а вкус совсем не такой, как вы привыкли. И вы теряетесь: как оценить? Какой у этого вина должен быть профиль? С чем его сравнивать? Самые смелые и активные идут в эту сторону и разбираются. А некоторые закрываются."
          - paragraph [ref=f2e84]:
            - emphasis [ref=f2e85]: У виноделия те же болячки, что и у любого направления экономики
          - paragraph [ref=f2e86]:
            - strong [ref=f2e87]: — Что нужно российскому виноделию, чтобы дальше двигаться? Каких законов не хватает?
          - paragraph [ref=f2e88]: "— У виноделия те же болячки, что и у любого направления экономики. Раньше главная проблема была в том, что это не было системой. Были отдельные прорывы: кто-то купил в Италии ферментаторы, прессы и начал делать вино. Но вокруг — ничего. Вино было, а экономики не было. Сейчас всё изменилось. Появилось своё оборудование, своя техника, юристы, которые умеют работать с землёй, почвоведы, которые знают, какие сорта сажать на конкретном участке."
          - paragraph [ref=f2e89]:
            - strong [ref=f2e90]: — Что сейчас работает лучше всего для продвижения?
          - paragraph [ref=f2e91]: — Мы вот на «Винорусе» обсуждали, как продвигаться. И никто не вспомнил про ярмарки. А ведь это замечательная история. Гораздо эффективнее, чем все блогеры вместе взятые, и газеты, и телевидение. Потому что человек приходит, пробует вино и может ещё поговорить с самим виноделом. Это фантастика. В этом году Роскачество запускает 17 ярмарок в 17 городах, каждая длится 4–5 дней. Несколько тысяч человек попробуют, а потом расскажут другим. Так что в этом смысле нам нужно просто время. Движение уже началось, и практически все инструменты у нас есть.
