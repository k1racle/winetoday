upstream frontend_upstream {
  server frontend:3000;
}

upstream backend_upstream {
  server backend:1337;
}

upstream api_upstream {
  server api:4000;
}

upstream meilisearch_upstream {
  server meilisearch:7700;
}

map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

server {
  listen 80;
  server_name _;

  client_max_body_size 50m;

  gzip on;
  gzip_comp_level 5;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_vary on;
  gzip_types
    text/plain
    text/css
    text/xml
    application/javascript
    application/json
    application/xml
    application/xml+rss
    image/svg+xml;

  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_set_header X-Forwarded-Host $host;

  proxy_connect_timeout 60s;
  proxy_send_timeout 60s;
  proxy_read_timeout 60s;

  # ---------------------------------------------------------------------------
  # 1. Strapi editor stats (backend) — before /api/editor/ → frontend
  # ---------------------------------------------------------------------------

  location ^~ /api/editor/author-stats/ {
    proxy_pass http://backend_upstream;
  }

  location ^~ /api/editor/member-profile-stats/ {
    proxy_pass http://backend_upstream;
  }

  # ---------------------------------------------------------------------------
  # 2. OAuth callbacks (backend)
  # ---------------------------------------------------------------------------

  location = /api/auth/google/callback {
    proxy_pass http://backend_upstream/api/auth/google/callback;
  }

  location = /api/auth/vk/callback {
    proxy_pass http://backend_upstream/api/auth/vk/callback;
  }

  # ---------------------------------------------------------------------------
  # 3. Media (API serves /uploads with AVIF conversion)
  # ---------------------------------------------------------------------------

  location ^~ /uploads/ {
    proxy_pass http://api_upstream/uploads/;
  }

  location = /upload {
    proxy_pass http://backend_upstream/upload;
  }

  location = /upload/ {
    return 204;
  }

  location ^~ /upload/ {
    proxy_pass http://backend_upstream;
  }

  # ---------------------------------------------------------------------------
  # 4. Strapi admin UI (backend)
  # ---------------------------------------------------------------------------

  location /admin/ {
    proxy_pass http://backend_upstream/admin/;
  }

  location ~* ^/admin/.+\.(?:js|css|svg|ico|map|woff2?)$ {
    proxy_pass http://backend_upstream;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
  }

  location /content-manager/ {
    proxy_pass http://backend_upstream/content-manager/;
  }

  location /content-manager/relations/ {
    proxy_pass http://backend_upstream/content-manager/relations/;
  }

  location /content-manager/uid/ {
    proxy_pass http://backend_upstream/content-manager/uid/;
  }

  location /content-type-builder/ {
    proxy_pass http://backend_upstream/content-type-builder/;
  }

  location /i18n/ {
    proxy_pass http://backend_upstream/i18n/;
  }

  location /tiptap-editor/ {
    proxy_pass http://backend_upstream/tiptap-editor/;
  }

  location /users/ {
    proxy_pass http://backend_upstream/users/;
  }

  location /users-permissions/ {
    proxy_pass http://backend_upstream/users-permissions/;
  }

  location /documentation/ {
    proxy_pass http://backend_upstream/documentation/;
  }

  # ---------------------------------------------------------------------------
  # 5. Next.js static assets (frontend)
  # ---------------------------------------------------------------------------

  location ^~ /_next/ {
    proxy_pass http://frontend_upstream;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
  }

  # ---------------------------------------------------------------------------
  # 6. Frontend API routes (Next.js BFF)
  # ---------------------------------------------------------------------------

  location = /api/auth/me {
    proxy_pass http://frontend_upstream/api/auth/me;
  }

  location = /api/auth/login {
    proxy_pass http://frontend_upstream/api/auth/login;
  }

  location = /api/auth/logout {
    proxy_pass http://frontend_upstream/api/auth/logout;
  }

  location = /api/auth/register {
    proxy_pass http://frontend_upstream/api/auth/register;
  }

  location = /api/auth/providers {
    proxy_pass http://frontend_upstream/api/auth/providers;
  }

  location = /api/auth/social/callback {
    proxy_pass http://frontend_upstream/api/auth/social/callback;
  }

  location ^~ /api/connect/ {
    proxy_pass http://frontend_upstream;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
  }

  location ^~ /api/community/ {
    proxy_pass http://frontend_upstream;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
  }

  location ^~ /api/editor/ {
    proxy_pass http://frontend_upstream;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
  }

  location = /api/revalidate {
    proxy_pass http://frontend_upstream/api/revalidate;
  }

  location = /api/og-image {
    proxy_pass http://frontend_upstream/api/og-image;
  }

  # ---------------------------------------------------------------------------
  # 7. Strapi REST API catch-all (backend)
  # ---------------------------------------------------------------------------

  location /api/ {
    proxy_pass http://backend_upstream/api/;
  }

  # ---------------------------------------------------------------------------
  # 8. Search (optional, Meilisearch)
  # ---------------------------------------------------------------------------

  location /search/ {
    proxy_pass http://meilisearch_upstream/;
  }

  # ---------------------------------------------------------------------------
  # 9. Site pages (frontend)
  # ---------------------------------------------------------------------------

  location / {
    proxy_pass http://frontend_upstream;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
  }
}
